<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABS Data Visualization - Autochtone bomen en struiken</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2d5a27;
            --secondary: #4a7c44;
            --accent: #8bc34a;
            --dark: #1a1a1a;
            --light: #f8f9fa;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--light);
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(26, 26, 26, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 350px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            color: var(--accent);
            font-weight: 600;
        }

        p {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            line-height: 1.4;
            opacity: 0.8;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .leaflet-popup-content-wrapper {
            background: var(--dark);
            color: var(--light);
            border-radius: 8px;
        }
        .leaflet-popup-tip {
            background: var(--dark);
        }
        .popup-title {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 5px;
        }
        .popup-sub {
            font-style: italic;
            margin-bottom: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>ABS Inventory</h1>
        <p>Visualizing autochthonous trees and shrubs in Flanders. This map displays a subset of the inventory data mapped to Darwin Core standards.</p>
        
        <div class="stats">
            <div class="stat-card">
                <span class="stat-value" id="total-count">...</span>
                <span class="stat-label">Records</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">5 Digits</span>
                <span class="stat-label">Precision</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <!-- Load embedded data -->
    <script src="data/map_data.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const map = L.map('map').setView([51.0, 4.5], 9);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            const markers = L.markerClusterGroup({
                showCoverageOnHover: false,
                spiderfyOnMaxZoom: true,
                zoomToBoundsOnClick: true
            });

            if (typeof absMapData !== 'undefined') {
                document.getElementById('total-count').innerText = absMapData.length.toLocaleString();

                absMapData.forEach(item => {
                    const marker = L.marker([item.lat, item.lng]);
                    
                    const popupContent = `
                        <div class="popup-title">${item.ver || 'Unknown Vernacular'}</div>
                        <div class="popup-sub">${item.name}</div>
                        <div style="font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;">
                            ${item.rem || 'No additional remarks'}
                        </div>
                    `;
                    
                    marker.bindPopup(popupContent);
                    markers.addLayer(marker);
                });

                map.addLayer(markers);
                
                if (absMapData.length > 0) {
                    map.fitBounds(markers.getBounds());
                }
            } else {
                console.error('Data not loaded');
                document.getElementById('total-count').innerText = '0';
            }
        });
    </script>
</body>
</html>
